name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  code-review:
    name: AI-Powered Code Review
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run validation
        id: validation
        run: |
          echo "Running validation checks..."
          
          # Lint
          if npm run lint; then
            echo "lint_status=вњ… Passed" >> $GITHUB_OUTPUT
          else
            echo "lint_status=вќЊ Failed" >> $GITHUB_OUTPUT
          fi
          
          # Test
          if npm run test; then
            echo "test_status=вњ… Passed" >> $GITHUB_OUTPUT
          else
            echo "test_status=вќЊ Failed" >> $GITHUB_OUTPUT
          fi
          
          # Build
          if npm run build; then
            echo "build_status=вњ… Passed" >> $GITHUB_OUTPUT
          else
            echo "build_status=вќЊ Failed" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true
        
      - name: Analyze changed files
        id: analyze
        run: |
          echo "Analyzing changed files..."
          
          # Get changed files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(ts|tsx|js|jsx)$' || echo "")
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Count files
          FILE_COUNT=$(echo "$CHANGED_FILES" | grep -c . || echo "0")
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
          
          # Check for console.log
          CONSOLE_LOGS=$(git diff origin/${{ github.base_ref }}...HEAD | grep -c "console\.log" || echo "0")
          echo "console_logs=$CONSOLE_LOGS" >> $GITHUB_OUTPUT
          
          # Check for TODOs
          TODOS=$(git diff origin/${{ github.base_ref }}...HEAD | grep -c "TODO\|FIXME" || echo "0")
          echo "todos=$TODOS" >> $GITHUB_OUTPUT
          
          # Check for test files
          TEST_FILES=$(echo "$CHANGED_FILES" | grep -c "\.test\." || echo "0")
          echo "test_files=$TEST_FILES" >> $GITHUB_OUTPUT
          
      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const lintStatus = '${{ steps.validation.outputs.lint_status }}';
            const testStatus = '${{ steps.validation.outputs.test_status }}';
            const buildStatus = '${{ steps.validation.outputs.build_status }}';
            const fileCount = '${{ steps.analyze.outputs.file_count }}';
            const consoleLogs = '${{ steps.analyze.outputs.console_logs }}';
            const todos = '${{ steps.analyze.outputs.todos }}';
            const testFiles = '${{ steps.analyze.outputs.test_files }}';
            
            let warnings = [];
            let suggestions = [];
            
            if (consoleLogs > 0) {
              warnings.push(`вљ пёЏ Found ${consoleLogs} console.log statement(s) - consider removing for production`);
            }
            
            if (todos > 0) {
              warnings.push(`в„№пёЏ Found ${todos} TODO/FIXME comment(s)`);
            }
            
            if (testFiles === '0' && fileCount > 0) {
              suggestions.push('рџ’Ў Consider adding tests for new code');
            }
            
            const allPassed = lintStatus.includes('вњ…') && testStatus.includes('вњ…') && buildStatus.includes('вњ…');
            
            const comment = `## рџ¤– AI Code Review
            
            ### рџ“Љ Validation Results
            
            | Check | Status |
            |-------|--------|
            | **Lint** | ${lintStatus} |
            | **Tests** | ${testStatus} |
            | **Build** | ${buildStatus} |
            
            ### рџ“€ Code Analysis
            
            - **Files changed**: ${fileCount} TypeScript/JavaScript files
            - **Test files**: ${testFiles}
            ${warnings.length > 0 ? '\n### вљ пёЏ Warnings\n\n' + warnings.join('\n') : ''}
            ${suggestions.length > 0 ? '\n### рџ’Ў Suggestions\n\n' + suggestions.join('\n') : ''}
            
            ### ${allPassed ? 'вњ… Status: Ready for Review' : 'вљ пёЏ Status: Needs Attention'}
            
            ${allPassed 
              ? '**All automated checks passed!** This PR is ready for human review.' 
              : '**Some checks need attention.** Please review the issues above and the detailed logs.'}
            
            ---
            <details>
            <summary>рџ“љ Review Guidelines</summary>
            
            - Ensure all tests pass locally: \`npm run validate\`
            - Check accessibility compliance (WCAG 2.2 AA)
            - Verify responsive design (mobile + desktop)
            - Review security implications
            - Confirm code follows project conventions
            </details>
            
            *Automated by GitHub Actions вЂў [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
